name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 dns_monitor.py example.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 dns_monitor.py example.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test syntax
      run: python -m py_compile dns_monitor.py example.py